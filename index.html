
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StayEase Totem</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <div id="home" class="screen active">
    <h1>StayEase</h1>
    <p>Totem Inteligente de Autoatendimento</p>

    <button onclick="showScreen('checkin')">Fazer Check-in</button>
    <button onclick="showScreen('checkout')">Fazer Check-out</button>
  </div>

  <div id="checkin" class="screen">
    <h2>Buscar Reserva</h2>

    <input type="text" id="cpf" placeholder="Digite o CPF">
    <input type="text" id="codigo" placeholder="Código da Reserva">

    <button onclick="buscarReserva()">Buscar Reserva</button>
    <button class="secondary" onclick="showScreen('home')">Voltar</button>
  </div>

  <div id="reserva" class="screen">
    <h2>Reserva Encontrada</h2>

    <div class="card">
      <p><strong>Nome:</strong> <span id="nomeHospede"></span></p>
      <p><strong>Quarto:</strong> <span id="quartoHospede"></span></p>
      <p><strong>Status:</strong> Confirmada</p>
    </div>

    <button onclick="validarRosto()">Validar Identidade</button>
  </div>

  <div id="face" class="screen">
    <h2>Validação Facial</h2>

    <div class="loader"></div>

    <p id="faceText">Analisando identidade...</p>
  </div>

  <div id="success" class="screen">
    <h2>Check-in Concluído</h2>

    <div class="card">
      <p>Quarto liberado com sucesso.</p>
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=StayEase305" alt="QR Code">
      <p><strong>Chave Digital:</strong> QR Code</p>
    </div>

    <button onclick="showScreen('home')">Finalizar</button>
  </div>

  <div id="checkout" class="screen">
    <h2>Check-out</h2>

    <div class="card">
      <p>Obrigado por utilizar o StayEase.</p>

      <label>Avalie sua estadia:</label>

      <select>
        <option>Excelente</option>
        <option>Boa</option>
        <option>Regular</option>
        <option>Ruim</option>
      </select>
    </div>

    <button onclick="checkout()">Finalizar Check-out</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
